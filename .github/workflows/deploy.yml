name: Deploy Next.js to GitHub Pages

on:
  push:
    branches:
      - main # Jalankan workflow jika ada push ke branch main

# Mengatur permissions yang diperlukan oleh GitHub Actions untuk deploy ke GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Mencegah deployment yang bertabrakan (concurrent deployments)
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Pages
        uses: actions/configure-pages@v5
        # Jika menggunakan custom domain atau subpath, action ini akan membantu mendeteksinya secara otomatis

      - name: Install Dependencies
        run: npm install

      - name: Build and Export
        env:
          # Memasukkan environment variables yang dibutuhkan saat build time
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || 'https://script.google.com/macros/s/AKfycbzqfFXx7y4CfVDJGv5twLxih4z3Q1sakewZrlw-2v2rXs683yBie0HNgOllM4DAg9brMQ/exec' }}
          NEXT_PUBLIC_GA_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_GA_MEASUREMENT_ID || 'G-P1M8K23' }}
          NEXT_PUBLIC_GTM_ID: ${{ secrets.NEXT_PUBLIC_GTM_ID || 'GTM-P1M8K23' }}
          NEXT_PUBLIC_WA_NUMBER: ${{ secrets.NEXT_PUBLIC_WA_NUMBER || '6282330449041' }}
          NEXT_PUBLIC_WA_ORDER_MESSAGE: "Halo TB NS Jaya, saya ingin memesan:"
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL || 'https://tbnsjaya.github.io' }}
          NEXT_PUBLIC_APP_NAME: "TB NS Jaya"
          NODE_ENV: production
        run: npm run build

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Arahkan ke folder static export (out)
          path: ./out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
